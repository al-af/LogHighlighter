<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Log Highlighter</title>
<link rel="icon" type="image/png" href="assets/icon.png">
<link rel="apple-touch-icon" href="assets/icon.png">
<link rel="stylesheet" href="styles/app.css">
</head>
<body>
<header>
  <h1>Log Highlighter</h1>
  <div class="header-right">
    <div class="mode-toggle" id="mode">
      <button data-mode="filter" class="active">Filter</button>
      <button data-mode="full">Full</button>
    </div>
    <button id="toggleTheme" class="header-btn" type="button" title="Toggle dark mode" aria-label="Toggle dark mode">☾</button>
    <button id="openGuide" class="header-btn" type="button" title="Show guide" aria-label="Show guide">? Guide</button>
  </div>
</header>
<div id="shareBanner" class="share-banner" hidden>
  <span class="share-banner-text">Loaded a shared setup (<span id="shareBannerCount">0</span> groups).</span>
  <button id="shareBannerUse" type="button">Use shared</button>
  <button id="shareBannerKeep" type="button">Keep mine</button>
  <button id="shareBannerMerge" type="button">Merge</button>
</div>
<main>
  <div class="left">
    <section class="panel">
      <h2>Keyword Groups</h2>
      <div class="panel-body">
        <div class="presets" id="presets">
          <select id="presetSelect" aria-label="Preset">
            <option value="">— Presets —</option>
          </select>
          <button id="presetCreate" type="button" title="Create a new preset from the current groups">+ New preset</button>
          <button id="presetDelete" type="button" title="Delete selected preset">×</button>
          <button id="copyShareLink" type="button" title="Copy a link with current groups">Share</button>
        </div>
        <div id="groups"></div>
        <div class="add-group">
          <input id="newGroup" placeholder="comma,separated,keywords" autocomplete="off">
          <button id="addGroup">Add</button>
        </div>
      </div>
    </section>
    <section class="panel">
      <h2>Input</h2>
      <textarea id="input" placeholder="paste raw logs here…  (best with logs under 500KB)" spellcheck="false"></textarea>
    </section>
  </div>
  <section class="panel">
    <h2>Output<span id="matchCount" class="match-count" hidden></span></h2>
    <div class="panel-body" id="output">
      <div class="placeholder">Add a keyword group and paste logs to begin.</div>
    </div>
  </section>
</main>
<script type="module" src="src/main.js"></script>
</body>
</html>
